name: Fetch Cross-Border Ecommerce News

on:
  schedule:
    # 每6小时运行一次 (UTC 0:00, 6:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news from ebrun.com
        run: node scripts/fetch-news.js

      - name: Commit and push news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news.json
          if git diff --staged --quiet; then
            echo "No changes to news.json"
          else
            git commit -m "chore: update news.json [auto]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
