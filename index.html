<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#EF4444" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#DC2626" media="(prefers-color-scheme: light)" />
    <meta name="description" content="根据日期和地区自动生成节日、大型活动、气候和采购建议的跨境电商工具" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="电商日历" />
    <meta name="msapplication-TileColor" content="#EF4444" />
    <meta name="msapplication-TileImage" content="/icons/pwa-144x144.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/pwa-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/pwa-72x72.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/pwa-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/pwa-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/pwa-128x128.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/icons/pwa-128x128.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/pwa-96x96.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/pwa-72x72.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/icons/pwa-72x72.png" />
    <link rel="mask-icon" href="/icons/pwa-192x192.png" color="#EF4444" />
    <title>全球电商日历</title>
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        background: #050505;
      }
      #root:empty::before {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        border: 2px solid rgba(239, 68, 68, 0.2);
        border-top-color: #EF4444;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        margin: -20px 0 0 -20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
